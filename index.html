<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wikipedia Reader</title>
  <link rel="stylesheet" href="styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap"
    rel="stylesheet">
</head>

<body class="theme-light font-medium">

  <div class="titlebar">
    <div class="titlebar-drag-region">Wikipedia Reader</div>
  </div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search Wikipedia..." autocomplete="off">
        <button id="search-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-target="toc-container">Contents</button>
        <button class="tab-btn" data-target="history-container">History</button>
      </div>
      <div class="toc-container tab-content active" id="toc-container">
        <!-- Table of contents will be populated here -->
        <p class="toc-empty">Search for an article to view its contents.</p>
      </div>
      <div class="history-container tab-content" id="history-container">
        <!-- History items will be populated here -->
        <p class="history-empty">No reading history yet.</p>
      </div>
    </aside>

    <main class="main-content">
      <header class="toolbar">
        <div class="toolbar-brand">
          <h1 id="article-title">Wikipedia Explorer</h1>
        </div>
        <div class="toolbar-controls">
          <div class="control-group">

            <button class="icon-btn theme-btn" data-theme="light" title="Light Theme">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5" />
                <path
                  d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
              </svg>
            </button>
            <button class="icon-btn theme-btn" data-theme="sepia" title="Sepia Theme">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />
                <path d="M4 12h16" />
              </svg>
            </button>
            <button class="icon-btn theme-btn" data-theme="dark" title="Dark Theme">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
          </div>
          <div class="control-group">
            <button class="icon-btn width-btn" data-action="decrease" title="Decrease Page Width">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M4 22h16A2 2 0 0 0 22 20V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2z" />
                <path d="M9 12h6" />
              </svg>
            </button>
            <button class="icon-btn width-btn" data-action="increase" title="Increase Page Width">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M3 3h18v18H3z" />
                <path d="M8 12h8" />
                <path d="M12 8v8" />
              </svg>
            </button>
          </div>
          <div class="control-group">
            <button class="icon-btn font-size-btn" data-action="decrease" title="Decrease Font Size">A-</button>
            <button class="icon-btn font-size-btn" data-action="increase" title="Increase Font Size">A+</button>
          </div>
        </div>
      </header>

      <div class="article-container" id="article-container">
        <div class="welcome-screen">
          <h2>Welcome to Wikipedia Reader</h2>
          <p>A distraction-free, Kindle-style reading experience.</p>
          <p>Use the search bar on the left to find an article.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
